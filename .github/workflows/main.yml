name: Test and publish
on:
  push:
    branches:
      - main
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version is new
        id: check
        run: |
          git fetch --tags --force
          CURRENT=$(node -p "require('./package.json').version")
          if git show-ref --verify "refs/tags/v$CURRENT" >/dev/null 2>&1; then
            echo "Tag v$CURRENT already exists, skipping publish"
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "New version $CURRENT — will publish"
          fi
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      # Node 24 bundles npm >= 11.5.1, required for OIDC trusted publishing.
      - name: Set up Node.js
        if: steps.check.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org
          scope: "@taprootio"

      - name: Build
        if: steps.check.outputs.should_publish == 'true'
        run: npm ci && npm run build

      # Auth comes from the npmjs.com trusted publisher via GitHub OIDC —
      # no registry token is stored or passed.
      - name: Publish
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish

      # Tag only after a successful publish so a failed publish leaves no tag
      # behind and a re-run retries instead of skipping.
      - name: Create git tag
        if: steps.check.outputs.should_publish == 'true'
        run: |
          git tag "v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"
